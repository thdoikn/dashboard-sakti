version: "3.9"

# Production docker-compose — uses pre-built GHCR images, no source code needed on the VM.
#
# On the VM you only need:
#   - this file
#   - mysql/init.sql   (DB initialization script)
#   - .env             (copy from .env.example and fill in secrets)
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# To pin a specific release (recommended for production):
#   IMAGE_TAG=sha-<git-sha> docker compose -f docker-compose.prod.yml up -d
#
# Note: No application-level authentication — access restricted at OIKN network level.

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR:          ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://${MYSQL_AIRFLOW_USER}:${MYSQL_AIRFLOW_PASSWORD}@${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_AIRFLOW_DB:-airflow_metadata}
  AIRFLOW__WEBSERVER__SECRET_KEY:   ${AIRFLOW__WEBSERVER__SECRET_KEY}
  AIRFLOW__CORE__LOAD_EXAMPLES:     "False"
  # Cookie hardening — session cookie gets Secure + SameSite when TLS terminates upstream.
  AIRFLOW__WEBSERVER__COOKIE_SECURE:    "True"
  AIRFLOW__WEBSERVER__COOKIE_SAMESITE:  "Lax"
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
  DJANGO_SETTINGS_MODULE:           config.settings.production
  MYSQL_DATA_DB:                    ${MYSQL_DATA_DB:-sakti_data}
  MYSQL_DATA_USER:                  ${MYSQL_DATA_USER:-sakti_app}
  MYSQL_DATA_PASSWORD:              ${MYSQL_DATA_PASSWORD}
  MYSQL_HOST:                       ${MYSQL_HOST:-mysql}
  MYSQL_PORT:                       ${MYSQL_PORT:-3306}
  SAKTI_API_BASE_URL:               ${SAKTI_API_BASE_URL}
  SAKTI_GATEWAY_API_KEY:            ${SAKTI_GATEWAY_API_KEY}

services:
  mysql:
    image: mysql:8.0
    container_name: sakti_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD:    ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:         sakti_data
      # Passed to init.sh so it can create app users with correct passwords
      MYSQL_DATA_PASSWORD:    ${MYSQL_DATA_PASSWORD}
      MYSQL_AIRFLOW_PASSWORD: ${MYSQL_AIRFLOW_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sakti_network

  backend:
    image: ghcr.io/thdoikn/dashboard-sakti/backend:${IMAGE_TAG:-latest}
    container_name: sakti_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY:      ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG:           "False"
      DJANGO_ALLOWED_HOSTS:   ${DJANGO_ALLOWED_HOSTS}
      MYSQL_DATA_DB:          ${MYSQL_DATA_DB:-sakti_data}
      MYSQL_DATA_USER:        ${MYSQL_DATA_USER:-sakti_app}
      MYSQL_DATA_PASSWORD:    ${MYSQL_DATA_PASSWORD}
      MYSQL_HOST:             ${MYSQL_HOST:-mysql}
      MYSQL_PORT:             ${MYSQL_PORT:-3306}
      SAKTI_API_BASE_URL:     ${SAKTI_API_BASE_URL}
      SAKTI_GATEWAY_API_KEY:  ${SAKTI_GATEWAY_API_KEY}
      OIDC_RP_CLIENT_ID:              ${OIDC_RP_CLIENT_ID}
      OIDC_RP_CLIENT_SECRET:          ${OIDC_RP_CLIENT_SECRET}
      OIDC_OP_AUTHORIZATION_ENDPOINT: ${OIDC_OP_AUTHORIZATION_ENDPOINT}
      OIDC_OP_TOKEN_ENDPOINT:         ${OIDC_OP_TOKEN_ENDPOINT}
      OIDC_OP_USER_ENDPOINT:          ${OIDC_OP_USER_ENDPOINT}
      OIDC_OP_JWKS_ENDPOINT:          ${OIDC_OP_JWKS_ENDPOINT}
    # Port 8000 intentionally NOT exposed externally in production —
    # all traffic routes through nginx on port 80 (which proxies /api/* to backend:8000).
    # Exposing 8000 directly would bypass nginx security headers and allow unauthenticated
    # access to the raw Django API.
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --settings=config.settings.production &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sakti_network

  frontend:
    image: ghcr.io/thdoikn/dashboard-sakti/frontend:${IMAGE_TAG:-latest}
    container_name: sakti_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sakti_network

  airflow-init:
    image: ghcr.io/thdoikn/dashboard-sakti/airflow:${IMAGE_TAG:-latest}
    container_name: sakti_airflow_init
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USER:     ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    volumes:
      - airflow_logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
               (airflow users create --username $$AIRFLOW_ADMIN_USER --firstname Admin --lastname User
                 --role Admin --email admin@oikn.go.id --password $$AIRFLOW_ADMIN_PASSWORD ||
                airflow users reset-password --username $$AIRFLOW_ADMIN_USER --password $$AIRFLOW_ADMIN_PASSWORD)"
    restart: on-failure
    networks:
      - sakti_network

  airflow-webserver:
    image: ghcr.io/thdoikn/dashboard-sakti/airflow:${IMAGE_TAG:-latest}
    container_name: sakti_airflow_webserver
    restart: unless-stopped
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USER:     ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    volumes:
      - airflow_logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
    # Bound to loopback only — the Airflow UI must NOT be reachable from the public
    # internet (see README). Access it via SSH tunnel:
    #   ssh -L 8080:localhost:8080 devapp@<vm-host>   then open http://localhost:8080
    ports:
      - "127.0.0.1:8080:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - sakti_network

  airflow-scheduler:
    image: ghcr.io/thdoikn/dashboard-sakti/airflow:${IMAGE_TAG:-latest}
    container_name: sakti_airflow_scheduler
    restart: unless-stopped
    environment:
      <<: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
    command: airflow scheduler
    networks:
      - sakti_network

volumes:
  mysql_data:
  airflow_logs:

networks:
  sakti_network:
    driver: bridge
