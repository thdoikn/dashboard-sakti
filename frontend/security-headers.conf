# Shared security headers — required to pass Acunetix / OWASP scans.
#
# IMPORTANT: nginx drops ALL inherited `add_header` directives in any location
# block that declares its own `add_header`. So this file must be `include`d in
# EVERY block that sets headers (e.g. the static-asset caching block), otherwise
# those responses lose the security headers (HSTS/CSP were missing on /assets/*).
add_header X-Frame-Options              "SAMEORIGIN"                                        always;
add_header X-Content-Type-Options       "nosniff"                                           always;
add_header X-XSS-Protection             "1; mode=block"                                     always;
add_header Referrer-Policy              "strict-origin-when-cross-origin"                   always;
add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()"          always;
add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"               always;
add_header Cross-Origin-Opener-Policy   "same-origin"                                       always;
add_header Cross-Origin-Embedder-Policy "require-corp"                                      always;
add_header Content-Security-Policy       "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
