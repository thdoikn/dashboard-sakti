server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — required to pass Acunetix / OWASP scans
    add_header X-Frame-Options           "SAMEORIGIN"                                        always;
    add_header X-Content-Type-Options    "nosniff"                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"          always;
    # HSTS — forwarded through Cloudflare to the client; enforces HTTPS-only access.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                always;
    # Cross-origin isolation headers (COOP/COEP).
    add_header Cross-Origin-Opener-Policy   "same-origin"                                    always;
    add_header Cross-Origin-Embedder-Policy "require-corp"                                    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;

    # Hide nginx version from error pages and headers
    server_tokens off;

    # Proxy /api/* and /health/* to the Django backend container.
    # This allows the frontend image to be built once with VITE_API_BASE_URL=/api
    # and work regardless of the VM's IP — no rebuild needed when deploying.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Forward the original scheme (Cloudflare sets this) so Django's
        # SECURE_PROXY_SSL_HEADER detects HTTPS and marks cookies Secure.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /health/ {
        proxy_pass         http://backend:8000/health/;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA fallback — all other routes served by index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
