server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — defined once in security-headers.conf and included here
    # AND inside every block that sets its own add_header (see the note in that
    # file: nginx drops inherited add_headers when a block declares its own).
    include /etc/nginx/security-headers.conf;

    # Hide nginx version from error pages and headers
    server_tokens off;

    # Proxy /api/* and /health/* to the Django backend container.
    # This allows the frontend image to be built once with VITE_API_BASE_URL=/api
    # and work regardless of the VM's IP — no rebuild needed when deploying.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Forward the original scheme (Cloudflare sets this) so Django's
        # SECURE_PROXY_SSL_HEADER detects HTTPS and marks cookies Secure.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /health/ {
        proxy_pass         http://backend:8000/health/;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SPA fallback — all other routes served by index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames).
    # Re-include the security headers — this block's add_header (Cache-Control)
    # would otherwise drop all the server-level security headers for *.js/*.css.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
